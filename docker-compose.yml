version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: kyc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PG_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/kyc
    volumes:
      - ./backend/weights:/app/weights

  celery_worker:
    build: ./backend
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PG_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/kyc
    volumes:
      - ./backend/weights:/app/weights

  frontend:
    build: ./id-capture
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/stream

volumes:
  pg_data:
  redis_data:
  minio_data:
